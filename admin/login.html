<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Admin | TicketOne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎟</text></svg>">
</head>
<body>
<div class="login-page">
  <div class="login-glow"></div>
  <div class="login-card">
    <div class="login-logo">
      <span class="mark">🎟</span>
      TicketOne
    </div>
    <div class="login-subtitle">Panel de Administración — Acceso restringido</div>

    <div class="form-group">
      <label class="form-label" for="email">Correo electrónico</label>
      <input class="form-input" type="email" id="email" placeholder="admin@ticketone.es" autocomplete="email" required>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <div style="position:relative;">
        <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px;" required>
        <button onclick="togglePassword()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:1rem;background:none;border:none;cursor:pointer;" id="pwd-toggle">👁</button>
      </div>
    </div>

    <div id="login-error" style="display:none;background:rgba(255,69,96,.1);border:1px solid rgba(255,69,96,.3);border-radius:var(--radius-m);padding:12px 16px;font-size:0.85rem;color:var(--danger);margin-bottom:16px;"></div>

    <button class="btn btn-primary btn-full btn-lg" id="btn-login" onclick="doLogin()">
      Entrar al panel
    </button>

    <a href="/" style="display:block;text-align:center;margin-top:20px;font-size:0.82rem;color:var(--text-3);">← Volver a la web</a>

    <div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--border);font-size:0.75rem;color:var(--text-3);text-align:center;line-height:1.6;">
      Solo el administrador autorizado puede acceder a este panel.<br>
      Si has olvidado tus credenciales, contacta con el desarrollador.
    </div>
  </div>
</div>
<div id="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="/js/firebase-config.js"></script>
<script src="/js/utils.js"></script>
<script>
  // Redirect if already logged in as admin
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      try {
        const snap = await db.collection('admins').doc(user.uid).get();
        if (snap.exists) window.location.href = '/admin/';
      } catch (_) {}
    }
  });

  function togglePassword() {
    const input = document.getElementById('password');
    const btn   = document.getElementById('pwd-toggle');
    input.type  = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
  }

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errBox   = document.getElementById('login-error');
    const btn      = document.getElementById('btn-login');

    errBox.style.display = 'none';

    if (!email || !password) {
      errBox.textContent = 'Por favor, completa todos los campos.';
      errBox.style.display = '';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Verificando...';

    try {
      const cred = await auth.signInWithEmailAndPassword(email, password);
      const adminSnap = await db.collection('admins').doc(cred.user.uid).get();

      if (!adminSnap.exists) {
        await auth.signOut();
        throw new Error('NO_ADMIN');
      }

      window.location.href = '/admin/';
    } catch (e) {
      let msg = 'Error al iniciar sesión. Inténtalo de nuevo.';
      if (e.message === 'NO_ADMIN') msg = 'Tu cuenta no tiene permisos de administrador.';
      else if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') msg = 'Correo o contraseña incorrectos.';
      else if (e.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Espera un momento.';
      errBox.textContent = msg;
      errBox.style.display = '';
      btn.disabled = false;
      btn.textContent = 'Entrar al panel';
    }
  }

  // Allow Enter key
  document.addEventListener('DOMContentLoaded', () => {
    ['email','password'].forEach(id => {
      document.getElementById(id)?.addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
      });
    });
  });
</script>
</body>
</html>
